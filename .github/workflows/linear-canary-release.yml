name: Linear Canary Release

on:
  push:
    tags:
      - nightly-latest

permissions:
  contents: read

jobs:
  publish-canary-release:
    name: Publish canary release
    runs-on: ubuntu-latest
    if: github.event.deleted == false

    steps:
      - name: Checkout nightly-latest
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on dev
        id: dev-check
        run: |
          git fetch --no-tags origin dev:refs/remotes/origin/dev
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

          tagged_commit="$(git rev-parse HEAD^{commit})"
          short_sha="$(git rev-parse --short "$tagged_commit")"
          tag_message="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          commit_message="$(git log -1 --pretty=%B "$tagged_commit")"
          build_number="$(
            printf '%s\n%s\n' "$tag_message" "$commit_message" \
              | sed -nE 's/^Nightly build ([0-9]+) for source commit.*$/\1/p' \
              | head -n 1
          )"

          if [[ -z "$build_number" ]]; then
            echo "Could not parse nightly build number from tag commit message." >&2
            echo "Expected a line like: Nightly build 509 for source commit" >&2
            exit 1
          fi

          echo "commit=${tagged_commit}" >> "$GITHUB_OUTPUT"
          echo "version=${build_number}" >> "$GITHUB_OUTPUT"
          echo "name=Phi Browser Canary Build ${build_number} (${short_sha})" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$tagged_commit" refs/remotes/origin/dev; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "nightly-latest does not point to a commit reachable from dev. Skipping Linear release."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Linear canary release
        if: steps.dev-check.outputs.should_publish == 'true'
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_CANARY_ACCESS_KEY }}
          command: sync
          version: ${{ steps.dev-check.outputs.version }}
          name: ${{ steps.dev-check.outputs.name }}
          log_level: verbose
