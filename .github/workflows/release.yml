name: Release Lua Browser

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable tag to publish (for example v0.1.0)
        required: true
        type: string
      framework_version:
        description: phibrowser-framework release tag
        required: false
        default: v2.2.0
        type: string
      framework_sha256:
        description: Required SHA-256 when framework_version is not v2.2.0
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-lua-browser
  cancel-in-progress: false

jobs:
  release:
    name: Sign, notarize, and publish
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_FRAMEWORK_VERSION: ${{ inputs.framework_version }}
          INPUT_FRAMEWORK_SHA256: ${{ inputs.framework_sha256 }}
          DEFAULT_FRAMEWORK_VERSION: ${{ vars.PHI_FRAMEWORK_VERSION }}
          DEFAULT_FRAMEWORK_SHA256: ${{ vars.PHI_FRAMEWORK_SHA256 }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="$INPUT_TAG"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use stable semantic versioning: vX.Y.Z" >&2
            exit 1
          fi
          version="${tag#v}"

          framework_version="${INPUT_FRAMEWORK_VERSION:-${DEFAULT_FRAMEWORK_VERSION:-v2.2.0}}"
          framework_sha256="${INPUT_FRAMEWORK_SHA256:-$DEFAULT_FRAMEWORK_SHA256}"
          if [[ "$framework_version" != "v2.2.0" && ! "$framework_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "A pinned framework_sha256 is required for $framework_version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "framework_version=$framework_version" >> "$GITHUB_OUTPUT"
          echo "framework_sha256=$framework_sha256" >> "$GITHUB_OUTPUT"

      - name: Checkout verified release tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          git fetch origin main "$TAG"
          git rev-parse --verify "refs/tags/$TAG^{commit}"
          git merge-base --is-ancestor "$TAG" origin/main || {
            echo "$TAG is not contained in origin/main." >&2
            exit 1
          }
          git checkout --detach "$TAG"

      - name: Validate release source
        run: ./script/release-preflight "${{ steps.release.outputs.version }}"

      - name: Verify required secrets
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 || secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_P8 || secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID || secrets.APPLE_API_ISSUER }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          for name in CERTIFICATE_P12 CERTIFICATE_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER TEAM_ID SPARKLE_PRIVATE_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Download pinned Phi Framework dependency
        env:
          PHI_FRAMEWORK_VERSION: ${{ steps.release.outputs.framework_version }}
          PHI_FRAMEWORK_SHA256: ${{ steps.release.outputs.framework_sha256 }}
          PHI_FRAMEWORK_URL: ${{ vars.PHI_FRAMEWORK_URL }}
        run: ./script/fetch_phi_framework.sh

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 || secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password="$(openssl rand -base64 36)"

          printf '%s' "$CERTIFICATE_P12" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Archive signed app
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Phi.xcodeproj \
            -scheme PhiBrowser-release \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -archivePath "$RUNNER_TEMP/Lua.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='Developer ID Application' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            PROVISIONING_PROFILE_SPECIFIER= \
            archive

      - name: Re-sign Chromium helpers and verify bundle
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          app="$RUNNER_TEMP/Lua.xcarchive/Products/Applications/Lua.app"
          identity="Developer ID Application: Jonatas Walker ($TEAM_ID)"
          ./script/sign_phi_bundle.sh \
            "$app" \
            "$identity" \
            "$GITHUB_WORKSPACE/Resources/PhiBrowser-OpenSource.entitlements"

          codesign -dv --verbose=4 "$app" 2>&1 | grep -E 'Identifier=|Authority=|TeamIdentifier=|Runtime Version'

      - name: Notarize and package
        id: package
        env:
          VERSION: ${{ steps.release.outputs.version }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_P8 || secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID || secrets.APPLE_API_ISSUER }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          app="$RUNNER_TEMP/Lua.xcarchive/Products/Applications/Lua.app"
          dist="$RUNNER_TEMP/dist"
          notarization_zip="$RUNNER_TEMP/Lua-notarization.zip"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          sparkle_key_path="$RUNNER_TEMP/sparkle-private-key"
          update_zip="Lua-Browser-${VERSION}-arm64.zip"
          dmg_name="Lua-Browser-${VERSION}-arm64.dmg"

          mkdir -p "$dist" "$RUNNER_TEMP/dmg-root" "$RUNNER_TEMP/appcast"
          printf '%s' "$APPLE_API_KEY" > "$api_key_path"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$sparkle_key_path"
          chmod 600 "$api_key_path" "$sparkle_key_path"

          ditto -c -k --keepParent "$app" "$notarization_zip"
          xcrun notarytool submit "$notarization_zip" \
            --key "$api_key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"

          ditto -c -k --keepParent "$app" "$dist/$update_zip"
          ditto "$app" "$RUNNER_TEMP/dmg-root/Lua.app"
          hdiutil create \
            -volname "Lua Browser" \
            -srcfolder "$RUNNER_TEMP/dmg-root" \
            -ov -format UDZO \
            "$dist/$dmg_name"

          xcrun notarytool submit "$dist/$dmg_name" \
            --key "$api_key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dist/$dmg_name"
          xcrun stapler validate "$dist/$dmg_name"

          ditto "$dist/$update_zip" "$RUNNER_TEMP/appcast/$update_zip"
          sparkle_bin="$(find "$RUNNER_TEMP/DerivedData/SourcePackages/artifacts/sparkle" -type d -path '*/Sparkle/bin' -print -quit)"
          if [[ -z "$sparkle_bin" ]]; then
            echo "Could not locate Sparkle release tools." >&2
            exit 1
          fi

          "$sparkle_bin/generate_appcast" \
            --ed-key-file "$sparkle_key_path" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/" \
            --maximum-deltas 0 \
            -o "$dist/appcast.xml" \
            "$RUNNER_TEMP/appcast"

          (
            cd "$dist"
            shasum -a 256 "$update_zip" "$dmg_name" appcast.xml > SHA256SUMS.txt
          )
          echo "dist=$dist" >> "$GITHUB_OUTPUT"
          echo "zip=$update_zip" >> "$GITHUB_OUTPUT"
          echo "dmg=$dmg_name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lua-Browser-${{ steps.release.outputs.version }}
          path: |
            ${{ steps.package.outputs.dist }}/${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.dist }}/${{ steps.package.outputs.dmg }}
            ${{ steps.package.outputs.dist }}/appcast.xml
            ${{ steps.package.outputs.dist }}/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          DIST: ${{ steps.package.outputs.dist }}
          ZIP_NAME: ${{ steps.package.outputs.zip }}
          DMG_NAME: ${{ steps.package.outputs.dmg }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "$DIST/$ZIP_NAME" "$DIST/$DMG_NAME" "$DIST/appcast.xml" "$DIST/SHA256SUMS.txt" \
              --clobber
          else
            gh release create "$TAG" \
              "$DIST/$ZIP_NAME" "$DIST/$DMG_NAME" "$DIST/appcast.xml" "$DIST/SHA256SUMS.txt" \
              --verify-tag \
              --title "Lua Browser $VERSION" \
              --generate-notes
          fi

      - name: Verify published artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          published="$RUNNER_TEMP/published"
          mkdir -p "$published"
          gh release download "$TAG" --dir "$published" \
            --pattern "Lua-Browser-${VERSION}-arm64.zip" \
            --pattern "Lua-Browser-${VERSION}-arm64.dmg" \
            --pattern appcast.xml \
            --pattern SHA256SUMS.txt
          (
            cd "$published"
            shasum -a 256 -c SHA256SUMS.txt
          )
          grep -q "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Lua-Browser-${VERSION}-arm64.zip" \
            "$published/appcast.xml"
